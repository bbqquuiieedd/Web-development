<html>
    <head>
    </head>
    <body>
        <p id="p1">Text</p>
        <button onclick="myFunction()">Click to style the paragraph</button>

        <script>
            function myFunction() {
                let x = document.getElementById("p1");
                x.style.color = "green";
                x.style.border = "dashed";
            }
        </script>
    </body>
</html>
